<div id="voice-overlay">
  <div id="voice-status">
    <span id="voice-dot"></span>
    <span id="voice-label">Idle</span>
  </div>
  <div id="voice-text"></div>
</div>

<style>
  #voice-overlay {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    font-family: monospace, system-ui;
    color: #eaeaea;
    pointer-events: none;
    text-align: center;
    user-select: none;
  }

  #voice-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(10, 10, 20, 0.72);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  #voice-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #555;
    display: inline-block;
  }

  #voice-overlay.listening #voice-dot {
    background: #ff4d5e;
    animation: voice-pulse 1s infinite ease-in-out;
  }

  #voice-overlay.listening #voice-label {
    color: #ff8a94;
  }

  #voice-overlay.error #voice-dot {
    background: #ffb020;
  }

  @keyframes voice-pulse {
    0% {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 0 0 0 rgba(255, 77, 94, 0.6);
    }

    70% {
      transform: scale(1.4);
      opacity: 0.7;
      box-shadow: 0 0 0 8px rgba(255, 77, 94, 0);
    }

    100% {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 0 0 0 rgba(255, 77, 94, 0);
    }
  }

  #voice-text {
    margin-top: 6px;
    font-size: 13px;
    color: #9fd3ff;
    min-height: 16px;
    text-shadow: 0 1px 2px #000;
  }
</style>

<script>
  (function () {
    "use strict";

    var overlay = document.getElementById("voice-overlay");
    var label = document.getElementById("voice-label");
    var textEl = document.getElementById("voice-text");

    function setState(state, labelText) {
      overlay.classList.remove("listening", "error");
      if (state) overlay.classList.add(state);
      if (labelText != null) label.textContent = labelText;
    }
    function setText(t) { textEl.textContent = t || ""; }

    function sendToGodot(obj) {
      var json = JSON.stringify(obj);
      if (typeof window.godotVoiceCallback === "function") {
        try { window.godotVoiceCallback(json); }
        catch (e) { console.warn("[voice_bridge] godotVoiceCallback threw:", e); }
      } else {
        console.log("[voice_bridge] (no Godot callback yet):", json);
      }
    }

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      console.warn("[voice_bridge] Web Speech API unsupported in this browser.");
      setState("error", "Voice unsupported");
      setText("Use keyboard: Q / W / E / R");
      window.addEventListener("load", function () {
        setTimeout(function () {
          sendToGodot({ type: "error", reason: "unsupported" });
        }, 500);
      });
    }

    var recognition = null;
    var listening = false;
    var gotResult = false;
    var firedCount = 0;

    function streamWords(fullText, isFinal) {
      var words = fullText.toLowerCase().split(/[^a-z]+/).filter(Boolean);
      setText("“" + words.join(" ") + "”");
      var limit = isFinal ? words.length : words.length - 1;
      for (var i = firedCount; i < limit; i++) {
        sendToGodot({ type: "result", text: words[i], confidence: 1.0 });
        gotResult = true;
      }
      if (limit > firedCount) firedCount = limit;
    }

    function buildRecognition() {
      var r = new SR();
      r.lang = "en-US";
      r.interimResults = true;   // fire on interim => no silence wait => fast
      r.maxAlternatives = 1;
      r.continuous = true;

      r.onstart = function () {
        listening = true;
        gotResult = false;
        firedCount = 0;
        setState("listening", "Listening...");
        setText("");
      };

      r.onresult = function (ev) {
        var full = "";
        for (var k = 0; k < ev.results.length; k++) full += ev.results[k][0].transcript + " ";
        var isFinal = ev.results[ev.results.length - 1].isFinal;
        streamWords(full, isFinal);
      };

      r.onerror = function (ev) {
        console.warn("[voice_bridge] recognition error:", ev.error);
        setState("error", "Error");
        setText(ev.error === "not-allowed"
          ? "Mic denied — use Q / W / E / R"
          : String(ev.error));
        sendToGodot({ type: "error", reason: ev.error || "unknown" });
      };

      r.onend = function () {
        listening = false;
        if (!gotResult) {
          sendToGodot({ type: "nomatch" });
        }
        setState(null, "Idle");
        sendToGodot({ type: "end" });
      };

      return r;
    }

    // ---- Public API (Godot calls these) ------------------------------------
    window.startVoiceRecognition = function () {
      if (!SR) { sendToGodot({ type: "error", reason: "unsupported" }); return; }
      if (listening) return;
      if (!recognition) recognition = buildRecognition();
      try {
        recognition.start();  // browser auto-prompts for mic permission
      } catch (e) {
        // start() throws if called too fast after a previous stop.
        console.warn("[voice_bridge] start() failed, retrying:", e);
        setTimeout(function () {
          try { recognition.start(); } catch (e2) {
            sendToGodot({ type: "error", reason: "start_failed" });
          }
        }, 120);
      }
    };

    window.stopVoiceRecognition = function () {
      if (recognition && listening) {
        try { recognition.stop(); } catch (e) { /* ignore */ }
      }
    };

    // ---- Handshake ----------------------------------------------------------
    // Godot may load before or after this script. If Godot already set its
    // callback, great. Also expose a hook Godot can call once it's ready.
    window.godotVoiceReady = function () {
      console.log("[voice_bridge] Godot reported ready.");
    };

    console.log("[voice_bridge] loaded. SpeechRecognition:", !!SR);
  })();
</script>
